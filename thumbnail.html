<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>Repository Thumbnail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a2342; /* Dark Navy */
        }
        .thumbnail-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 1280px;
            height: 640px;
            margin: auto;
            text-align: center;
        }
        .logo {
            max-width: 450px;
            max-height: 40%;
            margin-bottom: 40px;
        }
        .title {
            font-size: 52px;
            font-weight: 700;
            color: #ffffff;
            opacity: 0.95;
        }
        .subtitle {
            font-size: 28px;
            color: #00b4d8; /* Light Blue/Cyan Accent */
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="thumbnail-container">
        <img src="eg_1_logo.jpeg" alt="eg.1 Global Logo" class="logo">
        <div class="title">Interview Preparation Kit</div>
        <div class="subtitle">for eg.1 Global</div>
    </div>
</body>
</html>
